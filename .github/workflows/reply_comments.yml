name: Threads Comments Auto-Reply

on:
  schedule:
    # Runs every 2 hours from 8:30 AM to 10:30 PM IST (03:00 UTC to 17:00 UTC)
    - cron: '30 3,5,7,9,11,13,15,17 * * *'
  workflow_dispatch: # Allows manual trigger of replies check

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Bot Data Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/bot.db
            data/history.json
            data/thought_history.json
          key: bot-data-${{ github.run_id }}
          restore-keys: |
            bot-data-

      - name: Run replies checker script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          POST_TOPIC: ${{ secrets.POST_TOPIC }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          AUTOMATION_PAUSED: ${{ secrets.AUTOMATION_PAUSED }}
        run: python reply.py --random-delay

      - name: Save Bot Data Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data/bot.db
            data/history.json
            data/thought_history.json
          key: bot-data-${{ github.run_id }}
