name: Threads Daily Auto-Poster

on:
  schedule:
    - cron: '0 3,9,15 * * *' # Three times daily at 8:30 AM, 2:30 PM, 8:30 PM IST
  workflow_dispatch: # Allows manual trigger of the workflow

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Bot Data Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/bot.db
            data/history.json
            data/thought_history.json
          key: bot-data-${{ github.run_id }}
          restore-keys: |
            bot-data-

      - name: Run posting script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          POST_TOPIC: ${{ secrets.POST_TOPIC }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python main.py

      - name: Save Bot Data Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data/bot.db
            data/history.json
            data/thought_history.json
          key: bot-data-${{ github.run_id }}
