name: Threads Manual External Reply

on:
  workflow_dispatch:
    inputs:
      post_url:
        description: 'Threads Post URL to reply to'
        required: true
        type: string
      post_text:
        description: 'Text content of the post (for context)'
        required: true
        type: string

jobs:
  reply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Bot Data Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/bot.db
          key: bot-data-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            bot-data-

      - name: Run replies checker script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python reply.py --external-url "${{ github.event.inputs.post_url }}" --external-text "${{ github.event.inputs.post_text }}"

      - name: Commit and Push Updated Data Files
        if: always()
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data/bot.db data/bot.log || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update manual reply logs [skip ci]"
            git pull origin main --rebase -X theirs
            git push origin main
          fi

      - name: Ensure Cache Files Exist
        if: always()
        run: |
          mkdir -p data
          touch data/bot.db

      - name: Save Bot Data Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data/bot.db
          key: bot-data-${{ github.run_id }}-${{ github.run_attempt }}
