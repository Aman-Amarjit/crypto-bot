name: Threads Daily Question

on:
  schedule:
    - cron: '12 12 * * *'  # Daily at 12:12 PM UTC (5:42 PM IST)
  workflow_dispatch:       # Allows manual trigger

jobs:
  post_question:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Bot Data Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/bot.db
          key: bot-data-${{ github.run_id }}
          restore-keys: |
            bot-data-

      - name: Post daily question
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python question.py

      - name: Commit and Push Updated Data Files
        if: always()
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data/bot.db data/history.json data/thought_history.json data/question_history.json data/bot.log || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update bot data and history [skip ci]"
            git pull origin main --rebase -X theirs
            git push origin main
          else
            echo "No data changes to commit."
          fi

      - name: Ensure Cache Files Exist
        if: always()
        run: |
          mkdir -p data
          touch data/bot.db data/history.json data/thought_history.json data/question_history.json

      - name: Save Bot Data Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data/bot.db
          key: bot-data-${{ github.run_id }}
